name: Release Drafter

on:
  push:
    branches: [main]

jobs:
  draft:
    name: Draft next release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
